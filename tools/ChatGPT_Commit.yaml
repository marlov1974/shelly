description: Introduce boot/reboot runtime, fixed script ids 1-9, low-heap startup, and stable ChatGPT action plan file.

actions:
  - action: write
    path: rt/boot/base.js
    reason: Boot is the only autostart worker and starts master after stabilization delay.
    content: |
      // boot base 1.0.0-stabilize-then-master
      var SCRIPT_NAME = "boot";
      var SCRIPT_ID = 2;
      var MASTER_ID = 3;
      var BOOT_DELAY_MS = 60000;

  - action: write
    path: rt/boot/main.js
    reason: Wait for network/devices to stabilize, then start master and self-stop.
    content: |
      // boot main 1.0.0-stabilize-then-master
      function startMasterAndStop() {
        log("ST master #" + MASTER_ID);
        Shelly.call("Script.Start", { id: MASTER_ID }, function () {
          selfStop();
        });
      }

      function boot() {
        log("BOT");
        log("WAIT 60");
        Timer.set(BOOT_DELAY_MS, false, startMasterAndStop);
      }

      boot();

