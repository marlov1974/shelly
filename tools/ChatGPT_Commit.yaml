  - action: write
    path: rt/master/base.js
    reason: Shift master to script id 3 and add reboot slot constants.
    content: |
      // master base 1.3.0-boot-reboot-fixed-id
      var SCRIPT_NAME = "master";
      var SCRIPT_ID = 3;

      var INSTALLER_ID = 1;
      var BOOT_ID = 2;
      var MASTER_ID = 3;
      var POLL_ID = 4;
      var STATE_ID = 5;
      var WEATHER_ID = 6;
      var BRAIN_ID = 7;
      var DRIVER_ID = 8;
      var REBOOT_ID = 9;

      var TICK_MS = 60000;
      var CLEANUP_AT_MS = 50000;

      var WEATHER_EVERY_TICKS = 60;
      var INSTALL_EVERY_TICKS = 5;

      var TIMEOUT_POLL_MS = 10000;
      var TIMEOUT_STATE_MS = 5000;
      var TIMEOUT_WEATHER_MS = 15000;
      var TIMEOUT_INSTALLER_MS = 15000;
      var TIMEOUT_BRAIN_MS = 10000;
      var TIMEOUT_DRIVER_MS = 15000;
      var TIMEOUT_REBOOT_MS = 15000;

      var REBOOT_START_HOUR = 13;
      var REBOOT_START_MINUTE = 0;
      var REBOOT_END_MINUTE = 5;

      var tickCount = 0;
      var cycleRunning = 0;
      var cycleStartMs = 0;
      var rebootStarted = 0;

      function n(v, d) { var x = Number(v); return (x === x) ? x : d; }
      function i(v) { var x = Number(v); if (x !== x) return 0; return Math.floor(x + 0.5); }

  - action: write
    path: rt/master/run.js
    reason: Fixed-id low-memory runner with reboot worker included in cleanup.
    content: |
      // master run 1.3.0-fixed-id-boot-reboot
      function startScriptById(id, name, timeoutMs, cb) {
        log("ST " + name + " #" + id);

        Shelly.call("Script.Start", { id: id }, function (res, err) {
          if (err) {
            log("STE " + name);
            cb(0);
            return;
          }

          Timer.set(timeoutMs, false, function () {
            cb(1);
          });
        });
      }

      function startInstallerSlot(cb) { startScriptById(INSTALLER_ID, "installer", TIMEOUT_INSTALLER_MS, cb); }
      function startRebootSlot(cb) { startScriptById(REBOOT_ID, "reboot", TIMEOUT_REBOOT_MS, cb); }
      function startPoll(cb) { startScriptById(POLL_ID, "poll", TIMEOUT_POLL_MS, cb); }
      function startState(cb) { startScriptById(STATE_ID, "state", TIMEOUT_STATE_MS, cb); }
      function startWeather(cb) { startScriptById(WEATHER_ID, "weather", TIMEOUT_WEATHER_MS, cb); }
      function startBrain(cb) { startScriptById(BRAIN_ID, "brain", TIMEOUT_BRAIN_MS, cb); }
      function startDriver(cb) { startScriptById(DRIVER_ID, "driver", TIMEOUT_DRIVER_MS, cb); }

      function waitUntilCleanup(cb) {
        var elapsed = (new Date()).getTime() - cycleStartMs;
        var delay = CLEANUP_AT_MS - elapsed;
        if (delay < 0) delay = 0;
        log("REST " + i(delay / 1000));
        Timer.set(delay, false, cb);
      }

      function stopId(id, cb) {
        if (id === MASTER_ID) { cb(); return; }
        Shelly.call("Script.Stop", { id: id }, function () {
          Timer.set(80, false, cb);
        });
      }

      function cleanupWorkers(cb) {
        stopId(INSTALLER_ID, function () {
          stopId(BOOT_ID, function () {
            stopId(POLL_ID, function () {
              stopId(STATE_ID, function () {
                stopId(WEATHER_ID, function () {
                  stopId(BRAIN_ID, function () {
                    stopId(DRIVER_ID, function () {
                      stopId(REBOOT_ID, cb);
                    });
                  });
                });
              });
            });
          });
        });
      }

  - action: write
    path: rt/master/main.js
    reason: Service slot now supports daily reboot between 13:00 and 13:05, replacing poll/state/weather/install.
    content: |
      // master main 1.3.0-boot-reboot-slots
      function getHourNowLocal() { return (new Date()).getHours(); }
      function getMinuteNowLocal() { return (new Date()).getMinutes(); }

      function rebootDue() {
        var h;
        var m;
        if (rebootStarted) return 0;
        h = getHourNowLocal();
        m = getMinuteNowLocal();
        if (h !== REBOOT_START_HOUR) return 0;
        if (m < REBOOT_START_MINUTE) return 0;
        if (m > REBOOT_END_MINUTE) return 0;
        return 1;
      }

      function weatherDue() {
        return tickCount > 0 && (tickCount % WEATHER_EVERY_TICKS) === 0;
      }

      function installerDue() {
        if (weatherDue()) return 0;
        return tickCount > 0 && (tickCount % INSTALL_EVERY_TICKS) === 0;
      }

      function runServiceSlot(cb) {
        if (rebootDue()) {
          rebootStarted = 1;
          log("SLOT reboot");
          startRebootSlot(function () { cb("reboot"); });
          return;
        }

        if (weatherDue()) {
          log("SLOT weather");
          startWeather(function () { cb("weather"); });
          return;
        }

        if (installerDue()) {
          log("SLOT installer");
          startInstallerSlot(function () { cb("installer"); });
          return;
        }

        log("SLOT pollstate");
        startPoll(function () {
          startState(function () {
            cb("pollstate");
          });
        });
      }

      function runBrainDriver(cb) {
        startBrain(function () {
          startDriver(function () {
            cb();
          });
        });
      }

      function finishCycle() {
        waitUntilCleanup(function () {
          cleanupWorkers(function () {
            log("CLR");
            cycleRunning = 0;
          });
        });
      }

      function tick() {
        if (cycleRunning) {
          log("SKIP busy");
          return;
        }

        cycleRunning = 1;
        cycleStartMs = (new Date()).getTime();
        tickCount = tickCount + 1;
        log("TICK " + tickCount);

        runServiceSlot(function (slot) {
          if (slot === "installer" || slot === "reboot") {
            finishCycle();
            return;
          }

          runBrainDriver(function () {
            finishCycle();
          });
        });
      }

      function bootMaster() {
        log("BOT");
        Timer.set(1000, false, tick);
        Timer.set(TICK_MS, true, tick);
      }

      bootMaster();

